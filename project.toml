[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "retail-media-clv-optimizer"
version = "1.0.0"
description = "Predictive E-Commerce business intelligence engine running BG/NBD modeling arrays"
requires-python = ">=3.11"
dependencies = [
    "python-dotenv>=1.0.1"
]

[project.optional-dependencies]
dev = [
    "pytest==8.1.1",
    "pytest-cov==4.1.0",
    "black==24.2.0",
    "isort==5.13.2"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-ra -q --cov=clv_optimizer --cov-report=term-missing --cov-fail-under=90"
pythonpath = ["src"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]