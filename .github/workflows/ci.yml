name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Configure Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Base and Developer Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .[dev]

    - name: Enforce Import Sorting Formatting (isort)
      run: isort --check-only src tests

    - name: Enforce Code Style Formatting (black)
      run: black --check src tests

    - name: Enforce Syntax Linting (flake8)
      run: flake8 src tests --count --max-line-length=120 --ignore=E203 --statistics

    - name: Execute Automated Test Array & Verify Coverage Thresholds (pytest)
      run: pytest